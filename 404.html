<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — Page Not Found | Jafar Sadhiq</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;900&display=swap" rel="stylesheet">
<style>
	/* self-contained on purpose — an error page must not depend on site assets */
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body {
		font-family: 'Roboto', system-ui, sans-serif;
		min-height: 100vh;
		display: grid;
		place-items: center;
		background: #fafaf7;
		color: #111;
		text-align: center;
		padding: 24px;
	}
	main { max-width: 560px; }
	.wordmark { display: inline-block; margin-bottom: 28px; font-weight: 900; font-size: 19px; letter-spacing: .14em; text-transform: uppercase; color: #111; text-decoration: none; }
	.wordmark span { color: #d8924c; }
	.code {
		font-size: clamp(6rem, 22vw, 11rem);
		font-weight: 900;
		line-height: 1;
		letter-spacing: -0.04em;
		background: linear-gradient(180deg, #111 60%, #efce4a 140%);
		-webkit-background-clip: text;
		background-clip: text;
		-webkit-text-fill-color: transparent;
	}
	.rule { width: 56px; height: 3px; border-radius: 2px; background: #efce4a; margin: 22px auto; }
	h1 { font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 600; margin-bottom: 10px; }
	p { color: #7a7a7a; font-size: 15px; line-height: 1.7; margin-bottom: 30px; }
	.btn {
		display: inline-block;
		background: #111;
		color: #fff;
		text-decoration: none;
		font-size: 13px;
		font-weight: 600;
		letter-spacing: .12em;
		text-transform: uppercase;
		padding: 14px 30px;
		border-radius: 999px;
		transition: all .3s ease;
	}
	.btn:hover { background: #000; color: #efce4a; transform: translateY(-1px); }
	.ghost { background: transparent; color: #111; border: 1px solid #111; margin-left: 10px; }
	.ghost:hover { background: #111; color: #fff; }
	@media (max-width: 480px) {
		.btn { display: block; margin: 0 0 12px; }
		.ghost { margin-left: 0; }
	}
</style>
</head>
<body>
<main>
	<a class="wordmark" href="./">Jafar <span>Sadhiq</span></a>
	<div class="code">404</div>
	<div class="rule"></div>
	<h1>Page not found</h1>
	<p>This page doesn&rsquo;t exist — it may have been moved, or the link is broken.</p>
	<a class="btn" href="./">Back to Home</a><a class="btn ghost" href="project.html">View Projects</a>
</main>
</body>
</html>
